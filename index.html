<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloxyHorizons</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        video {
            max-width: 100%;
            max-height: 100vh;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <video id="intro" autoplay muted playsinline>
        <source id="videoSrc" src="" type="video/mp4">
    </video>
    <script>
        const youtubeURL = 'https://youtube.com/@bloxyhorizons';
        const video = document.getElementById('intro');
        const source = document.getElementById('videoSrc');

        function isPortrait() {
            return window.innerHeight > window.innerWidth;
        }

        source.src = isPortrait()
            ? 'BloxyHorizons_Portrait.mp4'
            : 'BloxyHorizons_Redirect_Video.mp4';
        video.load();
        video.play();

        video.addEventListener('ended', () => {
            window.location.href = youtubeURL;
        });

        setTimeout(() => {
            window.location.href = youtubeURL;
        }, 15000);
    </script>
</body>
</html>
